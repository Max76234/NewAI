<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HH Vortex</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        /* ── Reset & Base ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0f;
            --glass: rgba(255,255,255,0.04);
            --glass-border: rgba(255,255,255,0.09);
            --accent: #a78bfa;
            --accent2: #818cf8;
            --text-p: #f1f5f9;
            --text-s: #64748b;
            --bubble-user: rgba(167,139,250,0.15);
            --bubble-ai: rgba(255,255,255,0.04);
            --sidebar-w: 280px;
            --header-h: 56px;
            --input-h: 68px;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--text-p);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            font-size: 15px;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Ambient background ── */
        .liquid-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .orb {
            position: absolute;
            width: 60vw;
            height: 60vw;
            max-width: 320px;
            max-height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(139,92,246,0.18) 0%, transparent 70%);
            top: -10%;
            right: -10%;
            animation: float 8s ease-in-out infinite alternate;
        }
        @keyframes float { from { transform: translate(0,0) scale(1); } to { transform: translate(-20px,20px) scale(1.05); } }

        /* ── Overlay backdrop ── */
        .drawer-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 40;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }
        .drawer-overlay.open { display: block; }

        /* ── Sidebar / Drawer ── */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100%;
            width: var(--sidebar-w);
            background: rgba(10,10,20,0.97);
            border-right: 1px solid var(--glass-border);
            z-index: 50;
            display: flex;
            flex-direction: column;
            padding: 0;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
            will-change: transform;
        }
        .sidebar.open { transform: translateX(0); }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border-bottom: 1px solid var(--glass-border);
            min-height: var(--header-h);
        }
        .logo-mark {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 16px;
            color: var(--text-p);
        }
        .logo-mark span { color: var(--accent); }

        .close-drawer-btn {
            background: none;
            border: none;
            color: var(--text-s);
            font-size: 18px;
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            transition: 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .close-drawer-btn:hover { color: var(--text-p); background: var(--glass); }

        .new-chat-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            width: calc(100% - 32px);
            margin: 12px 16px;
            padding: 10px 14px;
            background: rgba(167,139,250,0.12);
            border: 1px solid rgba(167,139,250,0.25);
            color: var(--accent);
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .new-chat-btn:active { background: rgba(167,139,250,0.2); }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 8px;
            -webkit-overflow-scrolling: touch;
        }
        .chat-list::-webkit-scrollbar { display: none; }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-s);
            transition: 0.15s;
            border: 1px solid transparent;
            -webkit-tap-highlight-color: transparent;
        }
        .chat-item:active { background: rgba(255,255,255,0.06); }
        .chat-item.active { background: rgba(255,255,255,0.07); border-color: var(--glass-border); color: var(--text-p); }
        .chat-item-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .chat-delete-btn {
            background: none;
            border: none;
            color: #444;
            cursor: pointer;
            font-size: 13px;
            padding: 4px 6px;
            border-radius: 6px;
            flex-shrink: 0;
            transition: 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .chat-delete-btn:active { color: #ef4444; }

        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--glass-border);
        }
        .settings-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 10px;
            color: var(--text-s);
            font-size: 14px;
            cursor: pointer;
            transition: 0.15s;
            -webkit-tap-highlight-color: transparent;
            background: none;
            border: none;
            width: 100%;
        }
        .settings-btn:active { background: var(--glass); color: var(--text-p); }

        /* ── Main layout ── */
        .app-shell {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        /* ── Top header bar ── */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            height: var(--header-h);
            border-bottom: 1px solid var(--glass-border);
            background: rgba(10,10,20,0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            flex-shrink: 0;
            z-index: 10;
        }
        .menu-btn {
            background: none;
            border: none;
            color: var(--text-p);
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            -webkit-tap-highlight-color: transparent;
            transition: 0.15s;
        }
        .menu-btn:active { background: var(--glass); }
        .top-bar-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-p);
        }
        .top-bar-title span { color: var(--accent); }
        .top-new-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            -webkit-tap-highlight-color: transparent;
            transition: 0.15s;
        }
        .top-new-btn:active { background: var(--glass); }

        /* ── Messages area ── */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .messages-area::-webkit-scrollbar { display: none; }

        /* ── Landing UI ── */
        .landing-ui {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            padding: 24px 16px;
            gap: 28px;
            text-align: center;
        }
        .hero-text h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }
        .hero-text h1 span {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero-sub {
            margin-top: 8px;
            font-size: 14px;
            color: var(--text-s);
        }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 380px;
        }
        .action-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 14px 10px;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            -webkit-tap-highlight-color: transparent;
        }
        .action-card:active { background: rgba(255,255,255,0.08); border-color: var(--accent); }
        .action-card i { font-size: 20px; color: var(--accent); }
        .action-card h3 { font-size: 12px; font-weight: 600; color: var(--text-p); }
        .action-card p { font-size: 10px; color: var(--text-s); line-height: 1.3; }

        /* ── Message bubbles ── */
        .msg-row {
            display: flex;
            gap: 10px;
            padding: 4px 0;
            max-width: 100%;
        }
        .msg-row.user { justify-content: flex-end; }
        .msg-row.ai { justify-content: flex-start; align-items: flex-start; }

        .user-bubble {
            background: var(--bubble-user);
            border: 1px solid rgba(167,139,250,0.2);
            border-radius: 18px 18px 4px 18px;
            padding: 10px 14px;
            max-width: 82%;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }

        .ai-avatar {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            flex-shrink: 0;
            margin-top: 4px;
            background: rgba(167,139,250,0.2);
        }

        .ai-bubble {
            background: var(--bubble-ai);
            border: 1px solid var(--glass-border);
            border-radius: 4px 18px 18px 18px;
            padding: 10px 14px;
            max-width: calc(100% - 42px);
            font-size: 14px;
            line-height: 1.65;
            word-break: break-word;
            color: var(--text-p);
        }
        .ai-bubble p { margin-bottom: 8px; }
        .ai-bubble p:last-child { margin-bottom: 0; }
        .ai-bubble ul, .ai-bubble ol { padding-left: 20px; margin-bottom: 8px; }
        .ai-bubble li { margin-bottom: 4px; }
        .ai-bubble h1, .ai-bubble h2, .ai-bubble h3 { margin-bottom: 8px; margin-top: 12px; }
        .ai-bubble h1:first-child, .ai-bubble h2:first-child, .ai-bubble h3:first-child { margin-top: 0; }

        /* ── Code blocks ── */
        .ai-bubble pre {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
            max-width: 100%;
        }
        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 7px 12px;
            background: rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            font-size: 11px;
            color: #666;
        }
        .copy-btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.15);
            color: #aaa;
            padding: 3px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .copy-btn:active { border-color: #fff; color: #fff; }
        .copy-btn.copied { border-color: #4ade80; color: #4ade80; }
        .ai-bubble pre code {
            display: block;
            padding: 12px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.6;
            color: #e2e8f0;
            overflow-x: auto;
            white-space: pre;
            -webkit-overflow-scrolling: touch;
        }
        .ai-bubble code:not(pre code) {
            background: rgba(255,255,255,0.08);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 12px;
        }

        /* ── Cursor blink ── */
        .cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: #fff;
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: blink 0.7s infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        /* ── Input bar ── */
        .input-bar {
            flex-shrink: 0;
            padding: 8px 12px;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            background: rgba(10,10,20,0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid var(--glass-border);
        }
        .input-wrap {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 8px 8px 8px 14px;
            transition: border-color 0.2s;
        }
        .input-wrap:focus-within { border-color: rgba(167,139,250,0.4); }
        .msg-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-p);
            font-size: 15px;
            line-height: 1.5;
            resize: none;
            max-height: 120px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            font-family: inherit;
        }
        .msg-input::placeholder { color: var(--text-s); }
        .msg-input::-webkit-scrollbar { display: none; }
        .send-btn {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .send-btn:active { opacity: 0.8; transform: scale(0.96); }
        .send-btn:disabled { opacity: 0.35; }

        /* ── Scroll-to-bottom button ── */
        .scroll-btn {
            position: fixed;
            bottom: calc(var(--input-h) + 16px);
            right: 16px;
            width: 36px;
            height: 36px;
            background: rgba(167,139,250,0.2);
            border: 1px solid rgba(167,139,250,0.3);
            border-radius: 50%;
            color: var(--accent);
            font-size: 14px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10;
            -webkit-tap-highlight-color: transparent;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .scroll-btn.visible { display: flex; }

        /* ── Thinking indicator ── */
        .thinking {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 10px 14px;
        }
        .thinking span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0.4;
            animation: dot-pulse 1.2s ease-in-out infinite;
        }
        .thinking span:nth-child(2) { animation-delay: 0.2s; }
        .thinking span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dot-pulse { 0%,80%,100%{opacity:0.4;transform:scale(1)} 40%{opacity:1;transform:scale(1.3)} }
    </style>
</head>
<body>
    <div class="liquid-layer"><div class="orb"></div></div>

    <!-- Drawer overlay -->
    <div class="drawer-overlay" id="drawerOverlay" onclick="closeSidebar()"></div>

    <!-- Sidebar drawer -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-mark">HH <span>Vortex</span></div>
            <button class="close-drawer-btn" onclick="closeSidebar()">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <button class="new-chat-btn" onclick="newChat()">
            <i class="fa-solid fa-plus"></i> New Chat
        </button>

        <div class="chat-list" id="chatList"></div>

        <div class="sidebar-footer">
            <button class="settings-btn">
                <i class="fa-solid fa-gear"></i>
                <span>Settings</span>
            </button>
        </div>
    </nav>

    <!-- Main app shell -->
    <div class="app-shell">
        <!-- Top bar -->
        <header class="top-bar">
            <button class="menu-btn" onclick="openSidebar()">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="top-bar-title">HH <span>Vortex</span></div>
            <button class="top-new-btn" onclick="newChat()" title="New Chat">
                <i class="fa-solid fa-plus"></i>
            </button>
        </header>

        <!-- Messages -->
        <div class="messages-area" id="messagesArea">
            <!-- Landing UI -->
            <div class="landing-ui" id="landingUI">
                <div class="hero-text">
                    <h1>HH Vortex<br><span>Intelligence.</span></h1>
                    <p class="hero-sub">Powered by HH Lab</p>
                </div>
                <div class="action-grid">
                    <div class="action-card" onclick="quickPrompt('Introduce yourself')">
                        <i class="fa-solid fa-user"></i>
                        <h3>Identity</h3>
                        <p>Learn about Vortex</p>
                    </div>
                    <div class="action-card" onclick="quickPrompt('Explain Glassmorphism UI design')">
                        <i class="fa-solid fa-layer-group"></i>
                        <h3>Design</h3>
                        <p>UI/UX principles</p>
                    </div>
                    <div class="action-card" onclick="quickPrompt('Write a JavaScript function')">
                        <i class="fa-solid fa-code"></i>
                        <h3>Code</h3>
                        <p>Neural scripting</p>
                    </div>
                </div>
            </div>

            <!-- Chat messages rendered here -->
            <div id="output"></div>
        </div>

        <!-- Scroll to bottom button -->
        <button class="scroll-btn" id="scrollBtn" onclick="scrollToBottom()">
            <i class="fa-solid fa-chevron-down"></i>
        </button>

        <!-- Input bar -->
        <div class="input-bar">
            <div class="input-wrap">
                <textarea
                    id="inp"
                    class="msg-input"
                    placeholder="Message HH Vortex..."
                    rows="1"
                    autocomplete="off"
                    autocorrect="off"
                    spellcheck="true"
                ></textarea>
                <button class="send-btn" id="btn">
                    <i class="fa-solid fa-arrow-up"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    <script>
        const BASE_URL = "https://kerosene-unpleased-outcast.ngrok-free.dev";
        marked.setOptions({ breaks: true, gfm: true });

        // ── Sidebar ──
        function openSidebar() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('drawerOverlay').classList.add('open');
            document.body.style.overflow = 'hidden';
        }
        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('drawerOverlay').classList.remove('open');
            document.body.style.overflow = '';
        }

        // ── Chat state ──
        let chats = JSON.parse(localStorage.getItem('hh_chats') || '[]');
        let activeChatId = null;

        function saveChats() { localStorage.setItem('hh_chats', JSON.stringify(chats)); }
        function getActiveChat() { return chats.find(c => c.id === activeChatId); }

        function newChat() {
            closeSidebar();
            const id = Date.now().toString();
            chats.unshift({ id, title: 'New Chat', messages: [] });
            saveChats();
            switchChat(id);
        }

        function switchChat(id) {
            activeChatId = id;
            closeSidebar();
            renderChatList();
            renderMessages();
        }

        function deleteChat(id, e) {
            e.stopPropagation();
            chats = chats.filter(c => c.id !== id);
            saveChats();
            if (activeChatId === id) {
                if (chats.length > 0) switchChat(chats[0].id);
                else {
                    activeChatId = null;
                    renderChatList();
                    renderMessages();
                }
            } else {
                renderChatList();
            }
        }

        function renderChatList() {
            const list = document.getElementById('chatList');
            list.innerHTML = '';
            if (chats.length === 0) {
                list.innerHTML = '<div style="font-size:12px;color:#333;padding:16px 10px;">No chats yet</div>';
                return;
            }
            chats.forEach(chat => {
                const item = document.createElement('div');
                item.className = 'chat-item' + (chat.id === activeChatId ? ' active' : '');
                item.innerHTML = `
                    <i class="fa-regular fa-message" style="font-size:11px;flex-shrink:0;"></i>
                    <span class="chat-item-label">${chat.title}</span>
                    <button class="chat-delete-btn" title="Delete"><i class="fa-solid fa-trash"></i></button>
                `;
                item.onclick = () => switchChat(chat.id);
                item.querySelector('.chat-delete-btn').onclick = (e) => deleteChat(chat.id, e);
                list.appendChild(item);
            });
        }

        function renderMessages() {
            const output = document.getElementById('output');
            const landingUI = document.getElementById('landingUI');
            output.innerHTML = '';
            const chat = getActiveChat();

            if (!chat || chat.messages.length === 0) {
                landingUI.style.display = '';
                return;
            }
            landingUI.style.display = 'none';

            chat.messages.forEach(msg => {
                if (msg.role === 'user') {
                    const row = document.createElement('div');
                    row.className = 'msg-row user';
                    row.innerHTML = `<div class="user-bubble">${escapeHtml(msg.content)}</div>`;
                    output.appendChild(row);
                } else {
                    const row = document.createElement('div');
                    row.className = 'msg-row ai';
                    const bubble = document.createElement('div');
                    bubble.className = 'ai-bubble';
                    renderMarkdown(msg.content, bubble);
                    row.innerHTML = `<img src="logo.png" class="ai-avatar" onerror="this.style.background='rgba(167,139,250,0.3)'">`;
                    row.appendChild(bubble);
                    output.appendChild(row);
                }
            });
            scrollToBottom();
        }

        function escapeHtml(t) {
            return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function renderMarkdown(text, container) {
            container.innerHTML = marked.parse(text);
            container.querySelectorAll('pre').forEach(pre => {
                const code = pre.querySelector('code');
                const lang = code?.className?.replace('language-','') || 'code';
                const header = document.createElement('div');
                header.className = 'code-header';
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.innerHTML = '<i class="fa-regular fa-copy"></i> Copy';
                copyBtn.onclick = () => {
                    navigator.clipboard.writeText(code?.innerText || pre.innerText).then(() => {
                        copyBtn.innerHTML = '<i class="fa-solid fa-check"></i> Copied!';
                        copyBtn.classList.add('copied');
                        setTimeout(() => {
                            copyBtn.innerHTML = '<i class="fa-regular fa-copy"></i> Copy';
                            copyBtn.classList.remove('copied');
                        }, 2000);
                    });
                };
                header.innerHTML = `<span>${lang}</span>`;
                header.appendChild(copyBtn);
                pre.insertBefore(header, pre.firstChild);
            });
        }

        // ── Scroll tracking ──
        const area = document.getElementById('messagesArea');
        const scrollBtn = document.getElementById('scrollBtn');
        area.addEventListener('scroll', () => {
            const distFromBottom = area.scrollHeight - area.scrollTop - area.clientHeight;
            scrollBtn.classList.toggle('visible', distFromBottom > 120);
        });
        function scrollToBottom() {
            area.scrollTo({ top: area.scrollHeight, behavior: 'smooth' });
        }

        // ── Auto-resize textarea ──
        const inp = document.getElementById('inp');
        inp.addEventListener('input', () => {
            inp.style.height = 'auto';
            inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';
        });

        // ── AI handler ──
        const btn = document.getElementById('btn');
        const output = document.getElementById('output');

        async function handleAI() {
            const prompt = inp.value.trim();
            if (!prompt) return;
            if (!activeChatId) newChat();

            const chat = getActiveChat();
            const landingUI = document.getElementById('landingUI');
            landingUI.style.display = 'none';

            chat.messages.push({ role: 'user', content: prompt });
            if (chat.title === 'New Chat') {
                chat.title = prompt.slice(0, 32) + (prompt.length > 32 ? '…' : '');
            }
            saveChats();
            renderChatList();

            // User bubble
            const userRow = document.createElement('div');
            userRow.className = 'msg-row user';
            userRow.innerHTML = `<div class="user-bubble">${escapeHtml(prompt)}</div>`;
            output.appendChild(userRow);

            inp.value = '';
            inp.style.height = 'auto';
            btn.disabled = true;

            // AI bubble with thinking dots
            const aiRow = document.createElement('div');
            aiRow.className = 'msg-row ai';
            const bubble = document.createElement('div');
            bubble.className = 'ai-bubble';
            bubble.innerHTML = `<div class="thinking"><span></span><span></span><span></span></div>`;
            aiRow.innerHTML = `<img src="logo.png" class="ai-avatar" onerror="this.style.background='rgba(167,139,250,0.3)'">`;
            aiRow.appendChild(bubble);
            output.appendChild(aiRow);
            scrollToBottom();

            const historyPrompt = chat.messages
                .map(m => m.role === 'user' ? `User: ${m.content}` : `Assistant: ${m.content}`)
                .join('\n') + '\nAssistant:';
            const systemPrompt = `You are HH Vortex, an AI assistant created by HH Lab. Only reveal this identity when explicitly asked 'who are you'.\n\n`;
            let fullText = '';

            try {
                const response = await fetch(`${BASE_URL}/api/extra/generate/stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                    body: JSON.stringify({
                        prompt: systemPrompt + historyPrompt,
                        max_length: 512, temperature: 0.7, top_p: 0.9, top_k: 40,
                        rep_pen: 1.1, stop_sequence: ['\nUser:', '\nHuman:']
                    })
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let firstChunk = true;
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    for (const line of chunk.split('\n').filter(l => l.startsWith('data:'))) {
                        const jsonStr = line.replace(/^data:\s*/, '').trim();
                        if (!jsonStr || jsonStr === '[DONE]') continue;
                        try {
                            const parsed = JSON.parse(jsonStr);
                            fullText += parsed?.token ?? parsed?.text ?? '';
                            if (firstChunk) { bubble.innerHTML = ''; firstChunk = false; }
                            bubble.innerHTML = escapeHtml(fullText) + '<span class="cursor"></span>';
                            scrollToBottom();
                        } catch {}
                    }
                }
                renderMarkdown(fullText.trim(), bubble);

            } catch (err) {
                try {
                    bubble.innerHTML = `<div class="thinking"><span></span><span></span><span></span></div>`;
                    const r2 = await fetch(`${BASE_URL}/api/v1/generate`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                        body: JSON.stringify({
                            prompt: systemPrompt + historyPrompt,
                            max_length: 512, temperature: 0.7, top_p: 0.9, top_k: 40,
                            rep_pen: 1.1, stop_sequence: ['\nUser:', '\nHuman:']
                        })
                    });
                    if (!r2.ok) throw new Error(`HTTP ${r2.status}`);
                    const data = await r2.json();
                    fullText = data?.results?.[0]?.text ?? 'Keine Antwort erhalten.';
                    renderMarkdown(fullText.trim(), bubble);
                } catch (err2) {
                    bubble.innerHTML = `<span style="color:#ef4444">Fehler: ${err2.message}</span>`;
                }
            } finally {
                if (fullText) {
                    chat.messages.push({ role: 'assistant', content: fullText.trim() });
                    saveChats();
                }
                btn.disabled = false;
                scrollToBottom();
                inp.focus();
            }
        }

        window.quickPrompt = (text) => { inp.value = text; handleAI(); };
        btn.addEventListener('click', handleAI);
        inp.addEventListener('keydown', (e) => {
            // On mobile, Enter just adds newline — no send on Enter
            // On desktop (if keyboard detected), Enter sends
            if (e.key === 'Enter' && !e.shiftKey && window.innerWidth > 600) {
                e.preventDefault();
                handleAI();
            }
        });

        // ── Init ──
        if (chats.length > 0) switchChat(chats[0].id);
        else renderChatList();
    </script>
</body>
</html>
