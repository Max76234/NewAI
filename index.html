<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HH Vortex</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <style>
        /* Code block styling */
        .ai-bubble pre {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 0;
            margin: 12px 0;
            overflow: hidden;
        }
        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 14px;
            background: rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            font-size: 11px;
            color: #666;
        }
        .copy-btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.15);
            color: #aaa;
            padding: 3px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            transition: 0.2s;
        }
        .copy-btn:hover {
            border-color: #fff;
            color: #fff;
        }
        .copy-btn.copied {
            border-color: #4ade80;
            color: #4ade80;
        }
        .ai-bubble pre code {
            display: block;
            padding: 14px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            color: #e2e8f0;
            overflow-x: auto;
            white-space: pre;
        }
        .ai-bubble code:not(pre code) {
            background: rgba(255,255,255,0.08);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 13px;
            color: #e2e8f0;
        }
        /* Streaming cursor */
        .cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: #fff;
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: blink 0.7s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="liquid-layer"><div class="orb"></div></div>

    <nav class="sidebar">
        <img src="logo.png" alt="logo" class="user-logo">
        <div class="icon-btn"> <i class="fa-solid fa-gear"></i> </div>
    </nav>

    <main class="workspace" id="mainWrokspace">
        <div id="output"></div>

        <div class="landing-content" id="landingUI">
            <div class="hero-text">
                <h1>HH Vortex <span>Intelligence.</span></h1>
            </div>

            <div class="action-grid">
                <div class="action-card" onclick="quickPrompt('Introduce yourself')">
                    <i class="fa-solid fa-user"></i>
                    <h3>Identity</h3>
                    <p>Learn about HH Vortex</p>
                </div>
                <div class="action-card" onclick="quickPrompt('Explain Glassmorphism')">
                    <i class="fa-solid fa-layer-group"></i>
                    <h3>Design</h3>
                    <p>UI/UX principles</p>
                </div>
                <div class="action-card" onclick="quickPrompt('Write a JavaScript function')">
                    <i class="fa-solid fa-code"></i>
                    <h3>Code</h3>
                    <p>Neural scripting</p>
                </div>
            </div>

            <div class="input-area">
                <i class="fa-solid fa-code" style="color: var(--text-s); font-size: 14px;"></i>
                <input type="text" id="inp" placeholder="Message HH Vortex...">
                <button id="btn" style="background: none; border: none; color: var(--accent); cursor: pointer;">
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    <script>
        const BASE_URL = "https://kerosene-unpleased-outcast.ngrok-free.dev";

        const inp = document.getElementById("inp");
        const btn = document.getElementById("btn");
        const output = document.getElementById("output");
        const workspace = document.getElementById("mainWrokspace");

        // Configure marked
        marked.setOptions({ breaks: true, gfm: true });

        // Render markdown and add copy buttons to code blocks
        function renderMarkdown(text, container) {
            const html = marked.parse(text);
            container.innerHTML = html;

            // Add copy button to every <pre> block
            container.querySelectorAll('pre').forEach(pre => {
                const code = pre.querySelector('code');
                const lang = code?.className?.replace('language-', '') || 'code';

                const header = document.createElement('div');
                header.className = 'code-header';
                header.innerHTML = `<span>${lang}</span>`;

                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.innerHTML = '<i class="fa-regular fa-copy"></i> Copy';
                copyBtn.onclick = () => {
                    navigator.clipboard.writeText(code?.innerText || pre.innerText).then(() => {
                        copyBtn.innerHTML = '<i class="fa-solid fa-check"></i> Copied!';
                        copyBtn.classList.add('copied');
                        setTimeout(() => {
                            copyBtn.innerHTML = '<i class="fa-regular fa-copy"></i> Copy';
                            copyBtn.classList.remove('copied');
                        }, 2000);
                    });
                };

                header.appendChild(copyBtn);
                pre.insertBefore(header, pre.firstChild);
            });
        }

        async function handleAI() {
            const prompt = inp.value.trim();
            if (!prompt) return;

            workspace.classList.add('chat-active');

            const userRow = document.createElement("div");
            userRow.classList = 'msg-row user';
            userRow.innerHTML = `<div class="user-bubble">${prompt}</div>`;
            output.appendChild(userRow);

            inp.value = "";
            btn.disabled = true;

            const aiRow = document.createElement("div");
            aiRow.className = "msg-row ai";
            const bubble = document.createElement("div");
            bubble.className = "ai-bubble";
            bubble.innerHTML = `<span class="cursor"></span>`;
            aiRow.innerHTML = `<img src="logo.png" class="ai-avatar">`;
            aiRow.appendChild(bubble);
            output.appendChild(aiRow);
            output.scrollTop = output.scrollHeight;

            let fullText = "";

            try {
                const response = await fetch(`${BASE_URL}/api/extra/generate/stream`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "ngrok-skip-browser-warning": "true"
                    },
                    body: JSON.stringify({
                        prompt: `You are HH Vortex, an AI assistant created by HH Lab. Only reveal this identity when explicitly asked 'who are you'.\n\nUser: ${prompt}\nAssistant:`,
                        max_length: 512,
                        temperature: 0.7,
                        top_p: 0.9,
                        top_k: 40,
                        rep_pen: 1.1,
                        stop_sequence: ["\nUser:", "\nHuman:"]
                    })
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n').filter(l => l.startsWith('data:'));

                    for (const line of lines) {
                        const jsonStr = line.replace(/^data:\s*/, '').trim();
                        if (!jsonStr || jsonStr === '[DONE]') continue;
                        try {
                            const parsed = JSON.parse(jsonStr);
                            const token = parsed?.token ?? parsed?.text ?? '';
                            fullText += token;

                            // Live plain text while streaming, render markdown at end
                            bubble.innerHTML = fullText.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '<span class="cursor"></span>';
                            output.scrollTop = output.scrollHeight;
                        } catch {}
                    }
                }

                // Final render with full markdown + code copy buttons
                renderMarkdown(fullText.trim(), bubble);

            } catch (err) {
                // Fallback to non-streaming if stream endpoint fails
                try {
                    bubble.innerHTML = `<span class="cursor"></span>`;
                    const response2 = await fetch(`${BASE_URL}/api/v1/generate`, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "ngrok-skip-browser-warning": "true"
                        },
                        body: JSON.stringify({
                            prompt: `You are HH Vortex, an AI assistant created by HH Lab. Only reveal this identity when explicitly asked 'who are you'.\n\nUser: ${prompt}\nAssistant:`,
                            max_length: 512,
                            temperature: 0.7,
                            top_p: 0.9,
                            top_k: 40,
                            rep_pen: 1.1,
                            stop_sequence: ["\nUser:", "\nHuman:"]
                        })
                    });
                    if (!response2.ok) throw new Error(`HTTP ${response2.status}`);
                    const data = await response2.json();
                    const text = data?.results?.[0]?.text ?? "Keine Antwort erhalten.";
                    renderMarkdown(text.trim(), bubble);
                } catch (err2) {
                    bubble.innerHTML = `<span style="color:#ef4444">Fehler: ${err2.message}</span>`;
                    console.error(err2);
                }
            } finally {
                btn.disabled = false;
                output.scrollTop = output.scrollHeight;
                inp.focus();
            }
        }

        window.quickPrompt = (text) => { inp.value = text; handleAI(); };
        btn.addEventListener("click", handleAI);
        inp.addEventListener("keypress", (e) => { if (e.key === "Enter") handleAI(); });
    </script>
</body>
</html>
